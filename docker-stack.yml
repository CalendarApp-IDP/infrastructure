version: "3.8"

services:
  postgres_users:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: users_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - postgres_users_data:/var/lib/postgresql/data
    networks:
      - profile-net
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager] # Recommended for persistent data services

  postgres_calendar:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: calendar_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - postgres_calendar_data:/var/lib/postgresql/data
    networks:
      - app-net
      - worker-net
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]

  postgres_keycloak:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: keycloak_db
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - postgres_keycloak_data:/var/lib/postgresql/data
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres_keycloak:5432/keycloak_db
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
    configs:
      - source: keycloak-realm-config
        target: /opt/keycloak/data/import/realm-config.json
    ports:
      - "8080:8080"
    networks:
      - app-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - app-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
  
  rabbitmq:
    image: rabbitmq:3.12-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - app-net
      - worker-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  # MICROSERVICES
  profile:
    image: alinioan/profile-service:latest
    env_file: .env
    ports:
      - "5002:5000"
    networks:
      app-net:
        aliases:
          - profile_service
      profile-net:
        aliases:
          - profile_service
    command: sh -c "sleep 2 && python src/app.py"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  calendar:
    image: alinioan/calendar-service:latest
    env_file: .env
    ports:
      - "5000:5000"
    networks:
      app-net:
        aliases:
          - calendar_service
    command: sh -c "sleep 2 && python src/app.py"
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure

  worker:
    image: alinioan/suggestion-worker:latest
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
    networks:
      worker-net:
        aliases:
          - suggestion_worker
      profile-net:
        aliases:
          - suggestion_worker
    command: sh -c "sleep 2 && python src/worker.py"
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8082:80"
    networks:
      - app-net
    deploy:
      replicas: 1

  # API GATEWAY (KONG)
  kong:
    image: kong:3.7
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PLUGINS: bundled,prometheus
    configs:
      - source: kong-config
        target: /kong/kong.yml
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8443:8443"
    networks:
      - app-net
      - monitor-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  # MONITORING
  prometheus:
    image: prom/prometheus:latest
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    configs:
      - source: prometheus-config
        target: /etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - monitor-net
    deploy:
      replicas: 1

  node-exporter:
    image: prom/node-exporter:latest
    networks:
      - monitor-net
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    deploy:
      mode: global
      restart_policy:
        condition: on-failure

  # LOGGING
  loki:
    image: grafana/loki:latest
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - monitor-net
    deploy:
      replicas: 1

  promtail:
    image: grafana/promtail:latest
    command: -config.file=/etc/promtail/config.yml
    configs:
      - source: promtail-config
        target: /etc/promtail/config.yml
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - monitor-net
    deploy:
      mode: global

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - monitor-net
    deploy:
      replicas: 1

networks:
  app-net:
    driver: overlay
  profile-net:
    driver: overlay
  worker-net:
    driver: overlay
  monitor-net:
    driver: overlay

volumes:
  postgres_users_data:
  postgres_calendar_data:
  postgres_keycloak_data:

configs:
  keycloak-realm-config:
    file: ./keycloak/realm-config.json
  kong-config:
    file: ./kong/kong.yml
  prometheus-config:
    file: ./monitoring/prometheus.yml
  promtail-config:
    file: ./monitoring/promtail.yml