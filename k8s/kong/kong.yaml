apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong
  namespace: app
spec:
  replicas: 1

  selector:
    matchLabels:
      app: kong

  template:
    metadata:
      labels:
        app: kong

    spec:
      containers:
        - name: kong

          image: kong:3.7

          env:
            - name: KONG_DATABASE
              value: "off"

            - name: KONG_DECLARATIVE_CONFIG
              value: /kong/kong.yml

            - name: KONG_PROXY_ACCESS_LOG
              value: /dev/stdout

            - name: KONG_ADMIN_ACCESS_LOG
              value: /dev/stdout

            - name: KONG_PROXY_ERROR_LOG
              value: /dev/stderr

            - name: KONG_ADMIN_ERROR_LOG
              value: /dev/stderr

            - name: KONG_ADMIN_LISTEN
              value: 0.0.0.0:8001

            - name: KONG_PLUGINS
              value: bundled,prometheus

          ports:
            - containerPort: 8000

            - containerPort: 8001

            - containerPort: 8443

          volumeMounts:
            - name: kong-config-volume
              mountPath: /kong/kong.yml
              subPath: kong.yml

      volumes:
        - name: kong-config-volume
          configMap:
            name: kong-config

---
apiVersion: v1
kind: Service
metadata:
  name: kong
  namespace: app

spec:
  type: NodePort

  selector:
    app: kong

  ports:
    - name: proxy
      port: 8000
      targetPort: 8000
      nodePort: 30000

    - name: admin
      port: 8001
      targetPort: 8001
      nodePort: 30001

    - name: ssl
      port: 8443
      targetPort: 8443
      nodePort: 30443