apiVersion: apps/v1
kind: Deployment
metadata:
  name: profile
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: profile
  template:
    metadata:
      labels:
        app: profile
    spec:
      containers:
        - name: profile
          image: alinioan/profile-service:latest
          command: ["python"]
          args: ["src/app.py"]
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: app-config
---
apiVersion: v1
kind: Service
metadata:
  name: profile
  namespace: app
spec:
  selector:
    app: profile
  ports:
    - port: 5000